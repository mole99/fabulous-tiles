# Note: paths are relative to the tile's config.yaml

# PDN
PDN_MULTILAYER: false
#PDN_CFG: dir::../common/pdn_cfg.tcl
PDN_EXTEND_TO: "boundary"

GRT_ALLOW_CONGESTION: true

# Add buffers
DESIGN_REPAIR_BUFFER_INPUT_PORTS: False
DESIGN_REPAIR_BUFFER_OUTPUT_PORTS: True

# GRT diode insertion
GRT_ANTENNA_REPAIR_ITERS: 10

# DRT diode insertion
DRT_ANTENNA_REPAIR_ITERS: 10
DRT_ANTENNA_REPAIR_MARGIN: 10 # %

# Save space
BOTTOM_MARGIN_MULT: 1
TOP_MARGIN_MULT: 1
LEFT_MARGIN_MULT: 6
RIGHT_MARGIN_MULT: 6

# PDK specific
pdk::sky130A:
    # Routing
    RT_MAX_LAYER: met4

    # PDN
    PDN_VOFFSET: 5
    PDN_HOFFSET: 5

    PDN_VWIDTH: 1.6
    PDN_HWIDTH: 1.6

    PDN_VSPACING: 3.7
    PDN_HSPACING: 3.7

    PDN_VPITCH: 30
    PDN_HPITCH: 30

pdk::ihp-sg13g2:
    # Routing
    RT_MAX_LAYER: Metal5 #TopMetal1
    FP_PDN_VERTICAL_LAYER: Metal4
    FP_PDN_HORIZONTAL_LAYER: Metal5
    PDN_MULTILAYER: True

    # PDN
    PDN_VWIDTH: 2.2
    PDN_VSPACING: 4.0
    PDN_VPITCH: 75.6
    PDN_VOFFSET: 13.6

    PDN_HWIDTH: 2.0
    PDN_HSPACING: 4.0
    PDN_HPITCH: 75.6
    PDN_HOFFSET: 13.57

pdk::gf180mcuD:
    # Routing
    RT_MAX_LAYER: Metal4

    # PDN
    PDN_VPITCH: 100
    
    # PDK does not have a latch map yet
    SYNTH_LATCH_MAP: dir::../common/latch_map.v

    # Displacement for cells
    PL_MAX_DISPLACEMENT_Y: 300

# Use the minimum length for pins
# that satisfies the minimum area constraint
IO_PIN_H_LENGTH: null
IO_PIN_V_LENGTH: null
