meta:
  version: 2
  flow: FABulousTile
  substituting_steps:
    # Don't resize the buffers
    OpenROAD.Resizer*: null
    OpenROAD.RepairDesign*: null

    +OpenROAD.GlobalPlacement: OpenROAD.AddBuffers

FABULOUS_TILE_DIR: dir::.

# Basics
DESIGN_NAME: LUT4x8_C
VERILOG_FILES:
  - dir::../../models_pack.v
  - dir::../../custom.v

# Disable timing driven placement
# as it would resize the buffers
PL_TIMING_DRIVEN: false

# "AREA 0" "AREA 1" "AREA 2" "AREA 3"
SYNTH_STRATEGY: "AREA 2"

# Clock
CLOCK_PERIOD: 20
CLOCK_PORT: UserCLK

# Area
FP_SIZING: absolute
pdk::sky130*:
    # High density cells
    # Width should be multiple of 0.46 (met2 pitch)
    # Height should be multiple of 0.68 (met3 pitch)
    # Standard cell row height: 2.72 (4 met3 track)
    DIE_AREA: [0, 0, 210.8, 223.04]
    PL_TARGET_DENSITY_PCT: 58
pdk::gf180mcu*:
    # Width should be multiple of 0.56 (Metal2 pitch)
    # Height should be multiple of 0.56 (Metal3 pitch)
    # Standard cell row height: 3.92 (8 Metal3 track)
    DIE_AREA: [0, 0, 291.20, 291.20]
    PL_TARGET_DENSITY_PCT: 89
pdk::ihp-sg13*:
    # Width should be multiple of 0.48 (Metal2 pitch)
    # Height should be multiple of 0.42 (Metal3 pitch)
    # Standard cell row height: 3.78 (9 Metal3 tracks)
    DIE_AREA: [0, 0, 219.84, 219.24]
    PL_TARGET_DENSITY_PCT: 96
