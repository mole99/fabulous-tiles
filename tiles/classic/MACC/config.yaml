meta:
  version: 2
  flow: FABulousTile

FABULOUS_TILE_DIR: dir::.

# Basics
DESIGN_NAME: MACC
FABULOUS_SUPERTILE: true
VERILOG_FILES:
  - dir::../../../models_pack.v
  - dir::../../../custom.v

# Disable timing driven placement
# as it would resize the buffers
PL_TIME_DRIVEN: false

# "AREA 0" "AREA 1" "AREA 2" "AREA 3"
SYNTH_STRATEGY: "AREA 2"

# Clock
CLOCK_PERIOD: 20
CLOCK_PORT: Tile_X0Y1_N_GBUF_END[0]
